services:
  - type: web
    name: hello-ai-accessibility
    env: node
    region: singapore
    plan: free
    buildCommand: cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
